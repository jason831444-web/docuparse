services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docuparse
      POSTGRES_USER: docuparse
      POSTGRES_PASSWORD: docuparse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuparse -d docuparse"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://docuparse:docuparse@db:5432/docuparse
      UPLOAD_DIR: /app/uploads
      BACKEND_BASE_URL: http://localhost:8001
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    ports:
      - "8001:8000"
    volumes:
      - uploaded_files:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploaded_files:
