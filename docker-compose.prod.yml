services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        INSTALL_AI_DEPS: ${INSTALL_AI_DEPS:-true}
        INSTALL_LLAMA_CPP_DEPS: ${INSTALL_LLAMA_CPP_DEPS:-true}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      UPLOAD_DIR: /app/uploads
      BACKEND_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-64}
      STORAGE_BACKEND: local
      PROCESSING_MODE: inline
      QUEUE_BACKEND: local
      AI_INTERPRETATION_ENABLED: ${AI_INTERPRETATION_ENABLED:-true}
      AI_INTERPRETATION_PROVIDER: ${AI_INTERPRETATION_PROVIDER:-llama_cpp}
      AI_INTERPRETATION_MODEL: ${AI_INTERPRETATION_MODEL:-google/gemma-4-E4B-it}
      AI_INTERPRETATION_FALLBACK_MODEL: ${AI_INTERPRETATION_FALLBACK_MODEL:-google/gemma-2-2b-it}
      AI_INTERPRETATION_ENABLE_MODEL_FALLBACK: ${AI_INTERPRETATION_ENABLE_MODEL_FALLBACK:-true}
      AI_INTERPRETATION_FORCE_SMALL_MODEL: ${AI_INTERPRETATION_FORCE_SMALL_MODEL:-false}
      AI_INTERPRETATION_LOCAL_PREFER_SMALL_MODEL: ${AI_INTERPRETATION_LOCAL_PREFER_SMALL_MODEL:-false}
      LLAMA_CPP_MODEL_PATH: /models/gguf/${LLAMA_CPP_MODEL_FILE:?set LLAMA_CPP_MODEL_FILE}
      LLAMA_CPP_CONTEXT_WINDOW: ${LLAMA_CPP_CONTEXT_WINDOW:-4096}
      LLAMA_CPP_THREADS: ${LLAMA_CPP_THREADS:-0}
      LLAMA_CPP_GPU_LAYERS: ${LLAMA_CPP_GPU_LAYERS:-0}
      LLAMA_CPP_MAX_TOKENS: ${LLAMA_CPP_MAX_TOKENS:-700}
      LLAMA_CPP_TEMPERATURE: ${LLAMA_CPP_TEMPERATURE:-0.1}
      GEMMA_MODEL_NAME: ${GEMMA_MODEL_NAME:-google/gemma-4-E4B-it}
      GEMMA_MODEL_DIR: ${GEMMA_MODEL_DIR:-}
      GEMMA_DEVICE: ${GEMMA_DEVICE:-auto}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-paddleocr_vl}
      AI_SECONDARY_PROVIDER: ${AI_SECONDARY_PROVIDER:-qwen2_5_vl}
      AI_ENABLE_SECOND_PASS: ${AI_ENABLE_SECOND_PASS:-true}
      AI_SECOND_PASS_CONFIDENCE_THRESHOLD: ${AI_SECOND_PASS_CONFIDENCE_THRESHOLD:-0.80}
      AI_MODEL_DIR: /app/models
      PADDLEOCR_VL_MODEL_DIR: ${PADDLEOCR_VL_MODEL_DIR:-}
      PADDLEOCR_VL_LAYOUT_MODEL_DIR: ${PADDLEOCR_VL_LAYOUT_MODEL_DIR:-}
      PADDLEOCR_VL_DEVICE: ${PADDLEOCR_VL_DEVICE:-cpu}
      QWEN2_5_VL_MODEL_DIR: ${QWEN2_5_VL_MODEL_DIR:-}
      QWEN2_5_VL_DEVICE: ${QWEN2_5_VL_DEVICE:-auto}
    volumes:
      - uploaded_files:/app/uploads
      - model_cache:/app/models
      - ${LLAMA_CPP_MODEL_DIR_ON_HOST:?set LLAMA_CPP_MODEL_DIR_ON_HOST}:/models/gguf:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploaded_files:
  model_cache:
